{% set version = "0.9.9.20260408" %}

package:
  name: types-retry
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/types-retry/types_retry-{{ version }}.tar.gz
  sha256: 3f98fa62ec027449383f5c019cceacc784c1dbab4760989ddab421f7b8407d92

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check
    - test -f $SP_DIR/retry-stubs/__init__.pyi

about:
  home: https://github.com/python/typeshed
  summary: Typing stubs for retry
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
